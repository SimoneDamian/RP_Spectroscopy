# ==========================================
# LASER CONTROL APPLICATION CONFIGURATION
# ==========================================

# --- APPLICATION SETTINGS ---
app:
  name: "LaserLockingApp"
  version: "1.0.0"
  debug_mode: true           # If true, print verbose logs to console
  update_interval_ms: 500     # How often the GUI updates plots

# --- FILE PATHS ---
paths:

  # Where the application saves text logs (errors, events)
  logs: "/Users/simone/Desktop/Università/Trento/Master_theses/RP_Spectroscopy/GUI_TEST/logs"
  
  # Where the application saves the reference lines
  reference_lines: "/Users/simone/Desktop/Università/Trento/Master_theses/RP_Spectroscopy/GUI_TEST/reference_lines"
  
  # Path to hardware definitions
  hardware: "/Users/simone/Desktop/Università/Trento/Master_theses/RP_Spectroscopy/GUI_TEST/boards"

  # Path to save screenshots
  screenshots: "/Users/simone/Desktop/Università/Trento/Master_theses/RP_Spectroscopy/GUI_TEST/images/screenshots"

# --- NETWORK SERVICES ---
services:
  # ZeroRPC: For remote control from other scripts/consoles
  zerorpc:
    enabled: true
    host: "0.0.0.0"  # Listen on all interfaces
    port: 4242

  # Grafana (via InfluxDB): For long-term monitoring
  grafana:
    bucket: "LockingApp"
    org: "lab_bec"
    url: "http://localhost:8086"
    token: "VG0O9fEgoMWlKrn83VwaoU6w3IhfP3l-WJqF0kQCArYT2MdwPK-rgO68oH7_awXlnYyDYzCWDbOsbdY4kkJ0UA=="